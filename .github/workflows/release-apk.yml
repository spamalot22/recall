# Build and publish the Android APK only when a bare semantic version tag is pushed:
#
#   git tag 1.1.1
#   git push origin 1.1.1
#
# Tags with a leading "v" or prerelease suffixes do not publish.
name: release-apk

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.44.2

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.compute.outputs.name }}
      code: ${{ steps.compute.outputs.code }}
    steps:
      - id: compute
        run: |
          TAG="${{ github.ref_name }}"
          if ! [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must be bare semantic versions like 1.1.1."
            exit 1
          fi

          IFS=. read -r MAJ MIN PAT <<< "$TAG"
          CODE=$(( 10#${MAJ} * 1000000 + 10#${MIN} * 1000 + 10#${PAT} ))

          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "tag $TAG -> versionName $TAG, versionCode $CODE"

  server-check:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Build and test server
        working-directory: server
        run: |
          npm ci
          npm run build
          npm test
          npm audit --omit=dev --audit-level=moderate

  android:
    needs: [version, server-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Check Flutter app
        working-directory: app
        run: |
          flutter pub get
          flutter analyze
          flutter test
      - name: Set up release keystore
        working-directory: app/android
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not set. Configure release signing secrets before publishing APKs."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > app/recall-release.jks
          cat > key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=recall-release.jks
          EOF
          echo "Release keystore configured."
      - name: Build release APK
        working-directory: app
        run: |
          flutter build apk --release \
            --build-name=${{ needs.version.outputs.name }} \
            --build-number=${{ needs.version.outputs.code }} \
            --dart-define=APP_VERSION=${{ github.ref_name }}
      - name: Remove release signing material
        if: always()
        run: rm -f app/android/key.properties app/android/app/recall-release.jks
      - name: Prepare release asset
        run: mv app/build/app/outputs/flutter-apk/app-release.apk recall-android-${{ github.ref_name }}.apk
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: recall-release-apk
          path: recall-android-${{ github.ref_name }}.apk

  publish:
    needs: [version, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: recall-release-apk
          path: .
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "recall-android-${{ github.ref_name }}.apk" \
            --repo "${{ github.repository }}" \
            --title "Recall ${{ github.ref_name }}" \
            --generate-notes
