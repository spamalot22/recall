services:
  api:
    container_name: recall_api
    build:
      context: ./server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DRIZZLE_MIGRATIONS_DIR: ${DRIZZLE_MIGRATIONS_DIR:-./drizzle}
      HOST: 0.0.0.0
      PORT: 8787
      NODE_ENV: production
      LOG_LEVEL: info
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PUBLIC_REGISTRATION_ENABLED: ${PUBLIC_REGISTRATION_ENABLED:-false}
      RECALL_BOOTSTRAP_EMAIL: ${RECALL_BOOTSTRAP_EMAIL:-}
      RECALL_BOOTSTRAP_PASSWORD: ${RECALL_BOOTSTRAP_PASSWORD:-}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      TRUST_PROXY: ${TRUST_PROXY:-}
    ports:
      - "127.0.0.1:${RECALL_API_PORT:-8787}:8787"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    restart: unless-stopped
    networks:
      - recall_private

  db:
    container_name: recall_db
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - recall_db:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - recall_private

networks:
  recall_private:
    driver: bridge

volumes:
  recall_db:
